@keyframes pop{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.shock-red{background:#fef2f2;border:2px solid var(--red);color:var(--red)}
.shock-green{background:#f0fdf4;border:2px solid var(--green);color:var(--green)}
.shock-orange{background:#fff7ed;border:2px solid var(--orange);color:var(--orange)}

.capture-form{display:flex;gap:8px;flex-wrap:wrap}

.tunnel-links{display:flex;flex-wrap:wrap;gap:8px}

<body>
<header>
  <h1>🇯🇵 Japan Apartment — True Monthly Cost Calculator</h1>
  <p>Key money · Deposit · Agency fees · Kanri-hi · Renewal — what you REALLY pay per month</p>
</header>
<div class="container">
<div class="ad-slot no-print"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5382997898313669" data-ad-slot="1111111111" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});<\/script></div>
<div class="card">
  <h2>🏠 Your Apartment Details</h2>
  <div class="grid2">
    <div class="field"><label>Monthly rent (¥)</label><input type="number" id="rent" value="120000" oninput="calcJP()"/></div>
    <div class="field"><label>Lease duration (months)</label><input type="number" id="months" value="24" oninput="calcJP()"/></div>
    <div class="field"><label>Reikin / Key money (months)</label><input type="number" id="key" value="2" oninput="calcJP()"/></div>
    <div class="field"><label>Shikikin / Deposit (months)</label><input type="number" id="dep" value="2" oninput="calcJP()"/></div>
    <div class="field"><label>Agency fee (months)</label><input type="number" id="agent" value="1" oninput="calcJP()"/></div>
    <div class="field"><label>Cleaning fee (¥)</label><input type="number" id="clean" value="50000" oninput="calcJP()"/></div>
    <div class="field"><label>Kanri-hi / Admin monthly (¥)</label><input type="number" id="kanri" value="5000" oninput="calcJP()"/></div>
    <div class="field"><label>Renewal fee (months)</label><input type="number" id="renewal" value="1" oninput="calcJP()"/></div>
  </div>
  <button class="btn" onclick="calcJP()">⚡ Calculate Real Cost</button>
</div>
<div class="card">
  <h2>📊 Real Cost Breakdown</h2>
  <div class="result-row"><span class="res-label">💴 Upfront fees</span><span class="res-value" id="res_upfront">—</span></div>
  <div class="result-row"><span class="res-label">📅 Monthly total</span><span class="res-value" id="res_monthly">—</span></div>
  <div class="result-row"><span class="res-label">📦 Total over lease</span><span class="res-value" id="res_total">—</span></div>
  <div class="result-row"><span class="res-label">😱 Real cost / month</span><span class="res-value" id="res_real">—</span></div>
  <div class="result-row"><span class="res-label">🔍 Hidden fee ratio</span><span class="res-value" id="res_hidden">—</span></div>
  <div id="shock_jp" class="shock shock-red"></div>
  <div class="affiliate-box" id="aff_box"><h3>💡 Based on your results — tools that can help:</h3><div class="aff-links"><a class="aff-link" href="https://wise.com" target="_blank" rel="noopener sponsored">💳 Wise — Multi-currency account — Top expat bank</a><a class="aff-link" href="https://www.n26.com" target="_blank" rel="noopener sponsored">🏦 N26 — Free EU bank — No fees abroad</a><a class="aff-link" href="https://www.expatica.com" target="_blank" rel="noopener sponsored">📋 Expatica — Expat guide — Free resources</a></div></div>
  <div class="share-bar no-print"><button class="btn-sm btn-share" onclick="shareReddit()">🔴 Share on Reddit</button><button class="btn-sm btn-twitter" onclick="shareTwitter()">𝕏 Share on X</button><button class="btn-sm btn-pdf" onclick="exportPDF()">📄 Export PDF</button></div>
  <div class="capture-box no-print" id="capture_section"><h3>📧 Save your result + get updates when rules change</h3><p style="font-size:.82rem;color:#4338ca;margin-bottom:10px">We'll alert you when reikin/renewal rules change in your city.</p><form class="capture-form" onsubmit="submitEmail(event)"><input type="email" id="cap_email" placeholder="your@email.com" required/><button type="submit" class="btn-sm btn-email">Save free ↗</button></form><p id="cap_thanks" style="display:none;color:#16a34a;font-size:.85rem;margin-top:8px">✅ Saved! You'll be notified when japan-apartment-true-cost rules change.</p></div>

<script>

function exportPDF(){
  document.querySelector('.share-bar').style.display='none';
  document.querySelector('.capture-box').style.display='none';
  window.print();
  setTimeout(()=>{
    document.querySelector('.share-bar').style.display='flex';
    document.querySelector('.capture-box').style.display='block';
  },1000);
}
function shareReddit(){
  const txt = encodeURIComponent('I calculated the REAL cost of renting in Japan: ¥'+totalJP+'/mo — it\'s not what you think');
  const url = encodeURIComponent(window.location.href);
  window.open('https://www.reddit.com/submit?title='+txt+'&url='+url,'_blank');
}
function shareTwitter(){
  const txt = encodeURIComponent('I calculated the REAL cost of renting in Japan: ¥'+totalJP+'/mo — it\'s not what you think'+' '+window.location.href);
  window.open('https://twitter.com/intent/tweet?text='+txt,'_blank');
}
function submitEmail(e){
  e.preventDefault();
  const email = document.getElementById('cap_email').value;
  if(!email) return;
  const form  = new FormData();
  form.append('email', email);
  form.append('source', 'japan-apartment-true-cost');
  form.append('result', totalJP || 'N/A');
  fetch('https://formspree.io/f/xpwzpwzp',{
    method:'POST', body:form,
    headers:{'Accept':'application/json'}
  }).then(()=>{
    document.getElementById('cap_email').value='';
    document.getElementById('cap_thanks').style.display='block';
  }).catch(()=>{});
  return false;
}


var totalJP = 0;
function calcJP(){
  const rent   = parseFloat(document.getElementById('rent').value)||0;
  const months = parseInt(document.getElementById('months').value)||12;
  const key    = parseFloat(document.getElementById('key').value)||2;
  const dep    = parseFloat(document.getElementById('dep').value)||2;
  const agent  = parseFloat(document.getElementById('agent').value)||1;
  const clean  = parseFloat(document.getElementById('clean').value)||50000;
  const kanri  = parseFloat(document.getElementById('kanri').value)||5000;
  const renewal= parseFloat(document.getElementById('renewal').value)||1;
  const upfront= rent*(key+dep+agent) + clean;
  const monthly= rent + kanri;
  const totalLease = upfront + monthly*months + rent*renewal;
  const perMonth   = totalLease / months;
  totalJP = Math.round(perMonth);
  const pct_hidden = ((totalLease - rent*months)/totalLease*100).toFixed(0);
  document.getElementById('res_upfront').textContent = upfront.toLocaleString('ja-JP')+'¥';
  document.getElementById('res_monthly').textContent = monthly.toLocaleString('ja-JP')+'¥/月';
  document.getElementById('res_total').textContent   = totalLease.toLocaleString('ja-JP')+'¥';
  document.getElementById('res_real').textContent    = perMonth.toLocaleString('ja-JP')+'¥/月';
  document.getElementById('res_hidden').textContent  = pct_hidden+'% hidden fees';
  const shock = document.getElementById('shock_jp');
  shock.style.display = 'block';
  shock.innerHTML = '😱 You THINK you pay '+rent.toLocaleString('ja-JP')+
    '¥/mo — you ACTUALLY pay '+perMonth.toLocaleString('ja-JP')+
    '¥/mo (+'+pct_hidden+'% hidden)';
  document.getElementById('aff_box').style.display = 'block';
  document.getElementById('capture_section').style.display = 'block';
}

window.onload = calcJP;
</script>
</body></html>
